apiVersion: apps/v1
kind: Deployment
metadata:
  name: minecraft
  labels:
    app: minecraft
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minecraft
  template:
    metadata:
      labels:
        app: minecraft
    spec:
      containers:
        - name: minecraft
          image: wengor-minecraft:v3
          env:
            - name: MOTD
              value: wengor-ops4
          ports:
            - containerPort: 25565
          volumeMounts:
            - name: data
              mountPath: /opt/minecraft/world
  volumes:
    - name: minecraft-data
      persistentVolumeClaim:
        claimName: minecraft-pvc
